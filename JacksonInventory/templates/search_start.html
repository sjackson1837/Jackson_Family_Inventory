{% extends 'base.html' %}
{% block title %}
Search Page
{% endblock %}

{% block content %}
<br/>
<h1 class="display-4 font-weight-normal">Search Page</h1>
<br/>
<form method="POST" action="{{ url_for('search') }}" class="d-flex ml-auto" role="search">
    {{ form.hidden_tag() }}
    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="searched">
    <br/><br/>
    <button class="btn btn-outline-success" type="submit">Search</button>
</form>

{% endblock %}
